apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: htmly-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<ORG>/<REPO>
    targetRevision: production
    path: app/production
  destination:
    server: https://kubernetes.default.svc
    namespace: htmly-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
