name: production workflow

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - production
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: Pipeline mode
        type: choice
        required: true
        default: build_and_push
        options:
          - build_and_push
          - build_only
          - deploy_only
      gitops_app:
        description: GitOps engine
        type: choice
        required: true
        default: argocd
        options:
          - argocd
          - fluxcd
      argocd_deployment_mode:
        description: Argo CD deployment mode
        type: choice
        required: true
        default: kustomize
        options:
          - kustomize
          - application

jobs:
  pipeline:
    uses: glauciolabs/core-pipeline/.github/workflows/core-pipeline.yml@add2
    with:
      archetype: containers
      pipeline_mode: ${{ inputs.pipeline_mode || 'build_and_push' }}
      gitops_app: ${{ inputs.gitops_app || 'argocd' }}
      argocd_deployment_mode: ${{ inputs.argocd_deployment_mode || 'kustomize' }}
    secrets: inherit

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [pipeline]
    if: ${{ always() }}
    steps:
      - name: Send notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          STATUS: ${{ needs.pipeline.result }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not set. Skipping notification."
            exit 0
          fi
          run_url="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          text="Workflow: ${WORKFLOW_NAME}%0ARepo: ${REPO}%0ABranch: ${REF_NAME}%0AStatus: ${STATUS}%0ARun: ${run_url}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${text}" \
            -d "disable_web_page_preview=true" >/dev/null
